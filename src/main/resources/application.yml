server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blog_temp?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.blog.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  # 至少 32 字节。生产环境请通过环境变量覆盖，不要直接使用默认值。
  secret: ${JWT_SECRET:blog-temp-jwt-secret-change-me-32bytes}
  expiration-minutes: 120
